<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Riialin suku · Sukututkimus 1985–1987</title>
<meta name="description" content="Heikki Pirisen laatima sukututkimus Riialin suvusta, Parikkalan Joukion kylä, talo № 23. Zoomattava selailuversio alkuperäisestä kartasta.">
<style>
  :root {
    --paper: #efe9dc;
    --paper-deep: #e4dcc9;
    --ink: #2b2620;
    --ink-soft: #6b6354;
    --rule: #c9bfa8;
    --accent: #8c3b2e;
    --canvas: #1d1a15;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }
  body {
    display: flex;
    flex-direction: column;
    background: var(--canvas);
    font-family: Georgia, 'Times New Roman', serif;
    color: var(--ink);
  }

  header {
    background: var(--paper);
    border-bottom: 1px solid var(--rule);
    padding: 10px 16px 9px;
    display: flex;
    align-items: baseline;
    gap: 14px;
    flex-wrap: wrap;
    box-shadow: 0 1px 6px rgba(0,0,0,.35);
    z-index: 10;
  }
  header h1 {
    font-size: 17px;
    font-weight: 600;
    letter-spacing: .02em;
  }
  header h1 .nro { color: var(--accent); white-space: nowrap; }
  header .meta {
    font-size: 12.5px;
    color: var(--ink-soft);
    font-style: italic;
  }
  header .hint {
    margin-left: auto;
    font-size: 12px;
    color: var(--ink-soft);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-style: normal;
  }
  @media (max-width: 640px) {
    header .hint { display: none; }
    header h1 { font-size: 15px; }
  }

  #viewer { flex: 1; width: 100%; background: var(--canvas); }

  /* Toolbar */
  .toolbar {
    position: absolute;
    top: 12px;
    left: 12px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    z-index: 5;
  }
  .toolbar button {
    width: 38px;
    height: 38px;
    border: 1px solid var(--rule);
    border-radius: 4px;
    background: var(--paper);
    color: var(--ink);
    font-size: 18px;
    line-height: 1;
    cursor: pointer;
    box-shadow: 0 1px 4px rgba(0,0,0,.4);
    font-family: Georgia, serif;
  }
  .toolbar button:hover { background: var(--paper-deep); }
  .toolbar button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  footer {
    background: var(--paper);
    border-top: 1px solid var(--rule);
    padding: 6px 16px;
    font-size: 11.5px;
    color: var(--ink-soft);
    font-style: italic;
    z-index: 10;
  }

  /* OSD navigator framing */
  .navigator {
    border: 1px solid var(--rule) !important;
    background: var(--paper) !important;
    box-shadow: 0 1px 6px rgba(0,0,0,.4);
    border-radius: 3px;
  }
  @media (prefers-reduced-motion: reduce) {
    * { animation: none !important; transition: none !important; }
  }
</style>
</head>
<body>

<header>
  <h1>Riialin suku <span class="nro">· Joukio, talo № 23</span></h1>
  <span class="meta">Sukututkimus 1985–1987 · kartoittaja Heikki Pirinen</span>
  <span class="hint">Vieritä zoomataksesi · raahaa siirtyäksesi · kaksoisnapsautus lähentää</span>
</header>

<div id="viewer" role="application" aria-label="Zoomattava sukupuukartta"></div>

<div class="toolbar" aria-hidden="false">
  <button id="zoom-in"  title="Lähennä" aria-label="Lähennä">+</button>
  <button id="zoom-out" title="Loitonna" aria-label="Loitonna">−</button>
  <button id="home"     title="Sovita näkymään" aria-label="Sovita näkymään">⌂</button>
  <button id="full"     title="Koko näyttö" aria-label="Koko näyttö">⛶</button>
</div>

<footer>
  Alkuperäinen kartta n. 80 × 215 cm · sukupolvet merkitty roomalaisin numeroin IV–VII · digitoitu selailuversio 2026
</footer>

<script src="https://cdn.jsdelivr.net/npm/openseadragon@4.1.1/build/openseadragon/openseadragon.min.js"></script>
<script>
  var viewer = OpenSeadragon({
    id: 'viewer',
    tileSources: 'sukupuu.dzi',
    showNavigationControl: false,
    showNavigator: true,
    navigatorPosition: 'TOP_RIGHT',
    navigatorSizeRatio: 0.13,
    navigatorAutoFade: false,
    minZoomImageRatio: 0.8,
    maxZoomPixelRatio: 2.5,
    visibilityRatio: 0.6,
    constrainDuringPan: true,
    animationTime: 0.6,
    springStiffness: 8,
    gestureSettingsTouch: { pinchRotate: false },
    gestureSettingsMouse: { clickToZoom: false, dblClickToZoom: true }
  });

  document.getElementById('zoom-in').addEventListener('click', function () {
    viewer.viewport.zoomBy(1.5); viewer.viewport.applyConstraints();
  });
  document.getElementById('zoom-out').addEventListener('click', function () {
    viewer.viewport.zoomBy(1 / 1.5); viewer.viewport.applyConstraints();
  });
  document.getElementById('home').addEventListener('click', function () {
    viewer.viewport.goHome();
  });
  document.getElementById('full').addEventListener('click', function () {
    viewer.setFullScreen(!viewer.isFullPage());
  });
</script>

</body>
</html>
